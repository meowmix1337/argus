root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "migrations"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  stop_on_error = true
  kill_delay = "200ms"

[log]
  time = true

[misc]
  clean_on_exit = true
