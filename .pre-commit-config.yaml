repos:
  - repo: local
    hooks:
      - id: goimports
        name: goimports
        language: system
        entry: bash -c 'cd backend && goimports -w .'
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c 'cd backend && golangci-lint run ./...'
        pass_filenames: false
        types: [go]
